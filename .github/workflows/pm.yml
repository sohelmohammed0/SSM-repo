name: SSM Combined Pipeline (OIDC)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [feature, dev, test, prod]

      storage:
        description: "Storage"
        required: true
        type: choice
        options: [SSM]

      parameters:
        description: |
          Enter multiple key=value pairs (one per line)
          Example:
          DB_USER=admin
          DB_PASS=secret
        required: true

      team_name:
        description: "Team Name"
        required: true

      is_secret:
        description: "Is it a secret string?"
        required: true
        type: boolean
        default: true

      overwrite:
        description: "Overwrite if already exists?"
        required: true
        type: boolean
        default: true

      export_env:
        description: "Store in GitHub env?"
        required: true
        type: boolean
        default: false

  pull_request:
    branches:
      - dev
      - test
      - prod
      - "feature/*"

permissions:
  id-token: write
  contents: read

jobs:
  ssm-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 OIDC AUTH
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      # =============================
      # 🔹 STORE MULTIPLE PARAMETERS
      # =============================
      - name: Store Parameters
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          TYPE="String"
          if [ "${{ github.event.inputs.is_secret }}" = "true" ]; then
            TYPE="SecureString"
          fi

          OVERWRITE_FLAG=""
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            OVERWRITE_FLAG="--overwrite"
          fi

          echo "${{ github.event.inputs.parameters }}" | while IFS='=' read -r KEY VALUE
          do
            if [ -z "$KEY" ] || [ -z "$VALUE" ]; then
              echo "⚠️ Skipping invalid line"
              continue
            fi

            PARAM_NAME="/${{ github.event.inputs.team_name }}/${{ github.event.inputs.environment }}/$KEY"

            echo "📦 Storing: $PARAM_NAME"

            aws ssm put-parameter \
              --name "$PARAM_NAME" \
              --value "$VALUE" \
              --type "$TYPE" \
              $OVERWRITE_FLAG
          done

      # =============================
      # 🔹 DETECT ENV (PR)
      # =============================
      - name: Detect Environment
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BRANCH=${GITHUB_HEAD_REF}

          if [[ "$BRANCH" == feature/* ]]; then
            ENV="feature"
          elif [[ "$BRANCH" == dev ]]; then
            ENV="dev"
          elif [[ "$BRANCH" == test ]]; then
            ENV="test"
          elif [[ "$BRANCH" == prod ]]; then
            ENV="prod"
          else
            echo "❌ Unknown branch"
            exit 1
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "🌍 ENV = $ENV"

      # =============================
      # 🔹 FETCH PARAMETERS
      # =============================
      - name: Fetch Parameters
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          TEAM="DEVOPS"
          PATH="/$TEAM/$ENV/"

          echo "📥 Fetching from: $PATH"

          aws ssm get-parameters-by-path \
            --path "$PATH" \
            --with-decryption \
            --recursive \
            --query "Parameters[*].[Name,Value]" \
            --output text | while read NAME VALUE
          do
            KEY=$(basename $NAME)
            echo "$KEY=$VALUE" >> $GITHUB_ENV
          done

      # =============================
      # 🔹 SAFE VERIFY
      # =============================
      - name: Verify (Safe)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ -z "$testKey" ]; then
            echo "⚠️ testKey not found"
          else
            echo "✅ testKey loaded"
          fi

      - name: Ready
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "🚀 Secrets ready for use (values hidden)"