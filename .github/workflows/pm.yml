name: AWS Parameter Store Pipeline (Production - Stable)

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [feature, dev, test, prod]
      team_name:
        required: true
      parameters_json:
        description: "JSON array of {key,value,secure}"
        required: true
      overwrite:
        type: boolean
        default: true

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      team_name:
        required: true
        type: string
    outputs:
      param_list:
        value: ${{ jobs.fetch.outputs.param_list }}

permissions:
  id-token: write
  contents: read

jobs:

  # =========================
  # STORE PARAMETERS
  # =========================
  store:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Safe AWS CLI check (NO forced install)
      - name: Ensure AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            echo "Installing AWS CLI..."
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Store Parameters (Robust)
        run: |
          set -e

          TEAM="${{ github.event.inputs.team_name }}"
          ENV="${{ github.event.inputs.environment }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"

          PARAMS='${{ github.event.inputs.parameters_json }}'

          echo "$PARAMS" | jq -c '.[]' | while read -r param; do
            KEY=$(echo "$param" | jq -r '.key')
            VALUE=$(echo "$param" | jq -r '.value')
            SECURE=$(echo "$param" | jq -r '.secure // true')

            # Validation
            if [[ -z "$KEY" || -z "$VALUE" ]]; then
              echo "⚠️ Skipping invalid param"
              continue
            fi

            if [[ ! "$KEY" =~ ^[A-Z0-9_]+$ ]]; then
              echo "⚠️ Invalid key format: $KEY"
              continue
            fi

            TYPE="String"
            [ "$SECURE" = "true" ] && TYPE="SecureString"

            PATH="/$TEAM/$ENV/$KEY"

            # Duplicate protection
            if aws ssm get-parameter --name "$PATH" >/dev/null 2>&1; then
              if [ "$OVERWRITE" != "true" ]; then
                echo "⏭️ Skipping existing: $KEY"
                continue
              fi
            fi

            aws ssm put-parameter \
              --name "$PATH" \
              --value "$VALUE" \
              --type "$TYPE" \
              ${OVERWRITE:+--overwrite} \
              --tags "Key=Team,Value=$TEAM" "Key=Environment,Value=$ENV" \
              --no-cli-pager

            echo "✅ Stored: $KEY"
          done

  # =========================
  # FETCH PARAMETERS
  # =========================
  fetch:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest

    outputs:
      param_list: ${{ steps.fetch.outputs.param_list }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Safe AWS CLI check
      - name: Ensure AWS CLI
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            echo "Installing AWS CLI..."
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Fetch Parameters (Paginated + Secure)
        id: fetch
        run: |
          set -e

          TEAM="${{ inputs.team_name }}"
          ENV="${{ inputs.environment }}"
          PATH="/$TEAM/$ENV/"

          NEXT_TOKEN=""
          PARAM_LIST=""

          echo "📥 Fetching from $PATH"

          while : ; do

            if [ -z "$NEXT_TOKEN" ]; then
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$PATH" \
                --with-decryption \
                --recursive \
                --output json)
            else
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$PATH" \
                --with-decryption \
                --recursive \
                --starting-token "$NEXT_TOKEN" \
                --output json)
            fi

            echo "$RESPONSE" | jq -c '.Parameters[]' | while read -r param; do
              NAME=$(echo "$param" | jq -r '.Name')
              VALUE=$(echo "$param" | jq -r '.Value')
              KEY=$(basename "$NAME")

              # Mask sensitive values
              echo "::add-mask::$VALUE"

              echo "$KEY=$VALUE" >> $GITHUB_ENV
              PARAM_LIST="$PARAM_LIST$KEY "

              echo "🔑 Loaded: $KEY"
            done

            NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')
            [ -z "$NEXT_TOKEN" ] && break

          done

          PARAM_LIST="${PARAM_LIST% }"
          echo "param_list=$PARAM_LIST" >> $GITHUB_OUTPUT

          echo "📊 Total: $(echo $PARAM_LIST | wc -w) params"

      - name: Ready
        run: echo "✅ Parameters ready for use"