name: AWS Parameter Store Pipeline (Production - Stable)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [feature, dev, test, prod]
      team_name:
        description: "Team name"
        required: true
        type: string
      overwrite:
        description: "Overwrite existing parameters?"
        type: boolean
        default: true

      # ── Parameter 1 (required) ────────────────────
      param1_key:
        description: "Param 1 — Key"
        required: true
        type: string
      param1_value:
        description: "Param 1 — Value"
        required: true
        type: string
      param1_secure:
        description: "Param 1 — SecureString?"
        type: boolean
        default: true

      # ── Parameter 2 (optional) ────────────────────
      param2_key:
        description: "Param 2 — Key (optional)"
        required: false
        type: string
      param2_value:
        description: "Param 2 — Value"
        required: false
        type: string
      param2_secure:
        description: "Param 2 — SecureString?"
        type: boolean
        default: true

      # ── Parameter 3 (optional) ────────────────────
      param3_key:
        description: "Param 3 — Key (optional)"
        required: false
        type: string
      param3_value:
        description: "Param 3 — Value"
        required: false
        type: string
      param3_secure:
        description: "Param 3 — SecureString?"
        type: boolean
        default: true

      # ── Parameter 4 (optional) ────────────────────
      param4_key:
        description: "Param 4 — Key (optional)"
        required: false
        type: string
      param4_value:
        description: "Param 4 — Value"
        required: false
        type: string
      param4_secure:
        description: "Param 4 — SecureString?"
        type: boolean
        default: true

      # ── Parameter 5 (optional) ────────────────────
      param5_key:
        description: "Param 5 — Key (optional)"
        required: false
        type: string
      param5_value:
        description: "Param 5 — Value"
        required: false
        type: string
      param5_secure:
        description: "Param 5 — SecureString?"
        type: boolean
        default: true

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      team_name:
        required: true
        type: string
    outputs:
      param_list:
        value: ${{ jobs.fetch.outputs.param_list }}

permissions:
  id-token: write
  contents: read

jobs:

  # =========================
  # STORE PARAMETERS
  # =========================
  store:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI v2
        run: |
          if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
            echo "AWS CLI v2 already present."
          else
            echo "Installing AWS CLI v2..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Store Parameters
        run: |
          set -e

          TEAM="${{ github.event.inputs.team_name }}"
          ENV="${{ github.event.inputs.environment }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"

          # Validate team name — case-sensitive, only BillBox is allowed
          if [ "$TEAM" != "BillBox" ]; then
            echo "Invalid team name: '$TEAM'. Only 'BillBox' is permitted."
            echo "   To add more teams, update the workflow inputs and this check."
            exit 1
          fi

          # Pipe-delimited slots: KEY|VALUE|SECURE
          # Empty slots (params 2-5 are optional) are skipped automatically
          ENTRIES=""
          ENTRIES+="${{ github.event.inputs.param1_key }}|${{ github.event.inputs.param1_value }}|${{ github.event.inputs.param1_secure }}\n"
          ENTRIES+="${{ github.event.inputs.param2_key }}|${{ github.event.inputs.param2_value }}|${{ github.event.inputs.param2_secure }}\n"
          ENTRIES+="${{ github.event.inputs.param3_key }}|${{ github.event.inputs.param3_value }}|${{ github.event.inputs.param3_secure }}\n"
          ENTRIES+="${{ github.event.inputs.param4_key }}|${{ github.event.inputs.param4_value }}|${{ github.event.inputs.param4_secure }}\n"
          ENTRIES+="${{ github.event.inputs.param5_key }}|${{ github.event.inputs.param5_value }}|${{ github.event.inputs.param5_secure }}\n"

          # Use temp files for counters — subshell (pipe) can't write back to parent vars
          STORED_FILE=$(mktemp)
          SKIPPED_FILE=$(mktemp)
          FAILED_FILE=$(mktemp)
          echo 0 > "$STORED_FILE"
          echo 0 > "$SKIPPED_FILE"
          echo 0 > "$FAILED_FILE"

          SLOT=0
          echo -e "$ENTRIES" | while IFS='|' read -r KEY VALUE SECURE; do
            (( SLOT++ )) || true

            # Skip empty slots
            if [[ -z "$KEY" || -z "$VALUE" ]]; then
              continue
            fi

            # Mask key and value from all subsequent log output
            echo "::add-mask::$KEY"
            echo "::add-mask::$VALUE"

            TYPE="String"
            [ "$SECURE" = "true" ] && TYPE="SecureString"

            SSM_PATH="/$TEAM/$ENV/$KEY"

            # Respect overwrite flag
            if aws ssm get-parameter --name "$SSM_PATH" >/dev/null 2>&1; then
              if [ "$OVERWRITE" != "true" ]; then
                echo "Skipping existing param (slot $SLOT)"
                echo $(( $(cat "$SKIPPED_FILE") + 1 )) > "$SKIPPED_FILE"
                continue
              fi
            fi

            # Suppress AWS CLI JSON response output entirely
            if aws ssm put-parameter \
              --name "$SSM_PATH" \
              --value "$VALUE" \
              --type "$TYPE" \
              --overwrite \
              --no-cli-pager > /dev/null 2>&1; then
              echo "Stored param $SLOT (type=$TYPE)"
              echo $(( $(cat "$STORED_FILE") + 1 )) > "$STORED_FILE"
            else
              echo "Failed to store param $SLOT — check AWS permissions"
              echo $(( $(cat "$FAILED_FILE") + 1 )) > "$FAILED_FILE"
            fi

          done

          # Read final counts from temp files
          STORED=$(cat "$STORED_FILE")
          SKIPPED=$(cat "$SKIPPED_FILE")
          FAILED=$(cat "$FAILED_FILE")
          rm -f "$STORED_FILE" "$SKIPPED_FILE" "$FAILED_FILE"

          echo ""
          echo "──────────────────────────────"
          echo "Stored:  $STORED"
          echo "Skipped: $SKIPPED"
          echo "Failed:  $FAILED"
          echo "──────────────────────────────"

  # =========================
  # FETCH PARAMETERS
  # =========================
  fetch:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest

    outputs:
      param_list: ${{ steps.fetch.outputs.param_list }}

    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI v2
        run: |
          if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
            echo "AWS CLI v2 already present."
          else
            echo "Installing AWS CLI v2..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Fetch Parameters (Paginated + Secure)
        id: fetch
        run: |
          set -e

          TEAM="${{ inputs.team_name }}"
          ENV="${{ inputs.environment }}"
          SSM_PATH="/$TEAM/$ENV/"

          echo "Fetching from $SSM_PATH"

          NEXT_TOKEN=""
          PARAM_LIST_FILE=$(mktemp)

          while : ; do
            if [ -z "$NEXT_TOKEN" ]; then
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$SSM_PATH" \
                --with-decryption \
                --recursive \
                --output json \
                --no-cli-pager)
            else
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$SSM_PATH" \
                --with-decryption \
                --recursive \
                --starting-token "$NEXT_TOKEN" \
                --output json \
                --no-cli-pager)
            fi

            while read -r param; do
              NAME=$(echo "$param"  | jq -r '.Name')
              VALUE=$(echo "$param" | jq -r '.Value')
              KEY=$(basename "$NAME")

              # Mask sensitive values in logs
              echo "::add-mask::$VALUE"

              echo "$KEY=$VALUE" >> "$GITHUB_ENV"
              echo "$KEY" >> "$PARAM_LIST_FILE"

              echo "Loaded: $KEY"
            done < <(echo "$RESPONSE" | jq -c '.Parameters[]')

            NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')
            [ -z "$NEXT_TOKEN" ] && break
          done

          PARAM_LIST=$(paste -sd ' ' "$PARAM_LIST_FILE")
          rm -f "$PARAM_LIST_FILE"

          echo "param_list=$PARAM_LIST" >> "$GITHUB_OUTPUT"
          echo "Total: $(echo "$PARAM_LIST" | wc -w) params loaded"

      - name: Ready
        run: echo "✅ Parameters ready for use"