name: AWS Parameter Store Pipeline (Production)

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [feature, dev, test, prod]
      team_name:
        required: true
      parameters_json:
        description: "JSON array of {key,value,secure}"
        required: true
      overwrite:
        type: boolean
        default: true

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      team_name:
        required: true
        type: string
    outputs:
      param_list:
        value: ${{ jobs.fetch.outputs.param_list }}

permissions:
  id-token: write
  contents: read

jobs:
  store:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Store Parameters (Dynamic)
        run: |
          TEAM="${{ github.event.inputs.team_name }}"
          ENV="${{ github.event.inputs.environment }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"

          PARAMS='${{ github.event.inputs.parameters_json }}'

          echo "$PARAMS" | jq -c '.[]' | while read -r param; do
            KEY=$(echo "$param" | jq -r '.key')
            VALUE=$(echo "$param" | jq -r '.value')
            SECURE=$(echo "$param" | jq -r '.secure // true')

            if [ -z "$KEY" ] || [ -z "$VALUE" ]; then
              echo "Skipping invalid param"
              continue
            fi

            TYPE="String"
            if [ "$SECURE" = "true" ]; then
              TYPE="SecureString"
            fi

            PATH="/$TEAM/$ENV/$KEY"

            EXISTS=$(aws ssm get-parameter --name "$PATH" 2>/dev/null || true)

            if [ -n "$EXISTS" ] && [ "$OVERWRITE" != "true" ]; then
              echo "Duplicate key skipped: $KEY"
              continue
            fi

            aws ssm put-parameter \
              --name "$PATH" \
              --value "$VALUE" \
              --type "$TYPE" \
              ${OVERWRITE:+--overwrite} \
              --no-cli-pager

            echo "Stored: $KEY"
          done

  fetch:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest

    outputs:
      param_list: ${{ steps.fetch.outputs.param_list }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Fetch Parameters with Pagination
        id: fetch
        run: |
          TEAM="${{ inputs.team_name }}"
          ENV="${{ inputs.environment }}"
          PATH="/$TEAM/$ENV/"

          NEXT_TOKEN=""
          PARAM_LIST=""

          while : ; do
            if [ -z "$NEXT_TOKEN" ]; then
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$PATH" \
                --with-decryption \
                --recursive \
                --output json)
            else
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$PATH" \
                --with-decryption \
                --recursive \
                --starting-token "$NEXT_TOKEN" \
                --output json)
            fi

            echo "$RESPONSE" | jq -c '.Parameters[]' | while read -r param; do
              NAME=$(echo "$param" | jq -r '.Name')
              VALUE=$(echo "$param" | jq -r '.Value')
              KEY=$(basename "$NAME")

              echo "$KEY=$VALUE" >> $GITHUB_ENV
              PARAM_LIST="$PARAM_LIST$KEY "
            done

            NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')

            [ -z "$NEXT_TOKEN" ] && break
          done

          PARAM_LIST="${PARAM_LIST% }"
          echo "param_list=$PARAM_LIST" >> $GITHUB_OUTPUT

      - name: Mask Sensitive Values
        run: |
          echo "All parameters loaded securely (values masked in logs)."
