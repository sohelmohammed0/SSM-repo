name: SSM Combined Pipeline (OIDC)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [feature, dev, test, prod]

      storage:
        description: "Storage"
        required: true
        type: choice
        options: [PARAMETER STORE]

      parameter_key:
        description: "Parameter Key"
        required: true

      parameter_value:
        description: "Parameter Value"
        required: true

      team_name:
        description: "Team Name"
        required: true

      is_secret:
        description: "Is it a secret string?"
        required: true
        type: boolean
        default: true

      overwrite:
        description: "Overwrite if exists?"
        required: true
        type: boolean
        default: true

      export_env:
        description: "Store in GitHub env?"
        required: true
        type: boolean
        default: false

  pull_request:
    branches:
      - dev
      - test
      - prod
      - "feature/*"

permissions:
  id-token: write
  contents: read

jobs:
  ssm-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 OIDC AUTH
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      # =============================
      # 🔹 MANUAL MODE (STORE SECRET)
      # =============================
      - name: Validate Inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -z "${{ github.event.inputs.parameter_key }}" ] || [ -z "${{ github.event.inputs.parameter_value }}" ]; then
            echo "❌ Parameter key/value cannot be empty"
            exit 1
          fi

      - name: Build Parameter Name
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          PARAM_NAME="/${{ github.event.inputs.team_name }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.parameter_key }}"
          echo "PARAM_NAME=$PARAM_NAME" >> $GITHUB_ENV
          echo "📦 Parameter path: $PARAM_NAME"

      - name: Set Parameter Type
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${{ github.event.inputs.is_secret }}" = "true" ]; then
            echo "TYPE=SecureString" >> $GITHUB_ENV
          else
            echo "TYPE=String" >> $GITHUB_ENV
          fi

      - name: Store or Update Parameter
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            OVERWRITE_FLAG="--overwrite"
          else
            OVERWRITE_FLAG=""
          fi

          aws ssm put-parameter \
            --name "$PARAM_NAME" \
            --value "${{ github.event.inputs.parameter_value }}" \
            --type "$TYPE" \
            $OVERWRITE_FLAG

          echo "✅ Stored successfully"

      - name: Export to ENV (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.export_env == 'true' }}
        run: |
          echo "${{ github.event.inputs.parameter_key }}=${{ github.event.inputs.parameter_value }}" >> $GITHUB_ENV

      # =============================
      # 🔹 PR MODE (FETCH SECRETS)
      # =============================
      - name: Detect Environment
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BRANCH=${GITHUB_HEAD_REF}

          if [[ "$BRANCH" == feature/* ]]; then
            ENV="feature"
          elif [[ "$BRANCH" == dev ]]; then
            ENV="dev"
          elif [[ "$BRANCH" == test ]]; then
            ENV="test"
          elif [[ "$BRANCH" == prod ]]; then
            ENV="prod"
          else
            echo "❌ Unknown branch: $BRANCH"
            exit 1
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "🌍 Environment: $ENV"

      - name: Fetch Parameters
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          TEAM="DEVOPS"
          PATH="/$TEAM/$ENV/"

          echo "📥 Fetching from: $PATH"

          aws ssm get-parameters-by-path \
            --path "$PATH" \
            --with-decryption \
            --recursive \
            --query "Parameters[*].[Name,Value]" \
            --output text | while read NAME VALUE; do

              KEY=$(basename $NAME)
              echo "$KEY=$VALUE" >> $GITHUB_ENV

            done

      - name: Confirm Load (safe)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "✅ Secrets loaded into environment (values hidden)"