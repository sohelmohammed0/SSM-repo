name: SSM Combined Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [feature, dev, test, prod]

      storage:
        description: "Storage"
        required: true
        type: choice
        options: [SSM]

      parameter_key:
        description: "Parameter Key"
        required: false

      parameter_value:
        description: "Parameter Value"
        required: false

      team_name:
        description: "Team Name"
        required: true

      is_secret:
        description: "Secret String?"
        type: boolean
        default: true

      overwrite:
        description: "Overwrite?"
        type: boolean
        default: true

      export_env:
        description: "Export to env?"
        type: boolean
        default: false

  pull_request:
    branches:
      - dev
      - test
      - prod
      - "feature/*"


jobs:
  ssm-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # MODE DETECTION
      # -----------------------------
      - name: Detect Mode
        run: |
          echo "EVENT_NAME=${{ github.event_name }}"
      
      # -----------------------------
      # MANUAL MODE → STORE SECRET
      # -----------------------------
      - name: Store Secret in SSM
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.parameter_key != '' }}
        run: |
          PARAM_NAME="/${{ github.event.inputs.team_name }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.parameter_key }}"

          if [ "${{ github.event.inputs.is_secret }}" = "true" ]; then
            TYPE="SecureString"
          else
            TYPE="String"
          fi

          echo "Storing: $PARAM_NAME"

          aws ssm put-parameter \
            --name "$PARAM_NAME" \
            --value "${{ github.event.inputs.parameter_value }}" \
            --type "$TYPE" \
            --overwrite

      - name: Export env (manual mode)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.export_env == 'true' }}
        run: |
          echo "${{ github.event.inputs.parameter_key }}=${{ github.event.inputs.parameter_value }}" >> $GITHUB_ENV

      # -----------------------------
      # PR MODE → FETCH SECRETS
      # -----------------------------
      - name: Detect environment from branch
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BRANCH=${GITHUB_HEAD_REF}

          if [[ "$BRANCH" == feature/* ]]; then
            ENV="feature"
          elif [[ "$BRANCH" == dev ]]; then
            ENV="dev"
          elif [[ "$BRANCH" == test ]]; then
            ENV="test"
          elif [[ "$BRANCH" == prod ]]; then
            ENV="prod"
          fi

          echo "ENV=$ENV" >> $GITHUB_ENV

      - name: Fetch secrets from SSM
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          TEAM="payments"  # you can improve this later
          PATH="/$TEAM/$ENV/"

          echo "Fetching from: $PATH"

          aws ssm get-parameters-by-path \
            --path "$PATH" \
            --with-decryption \
            --recursive \
            --query "Parameters[*].[Name,Value]" \
            --output text | while read NAME VALUE; do

              KEY=$(basename $NAME)
              echo "$KEY=$VALUE" >> $GITHUB_ENV

            done

      - name: Use secrets (PR mode)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "DB_HOST=$DB_HOST"