name: AWS Parameter Store Pipeline (Production - Stable)

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [feature, dev, test, prod]
      team_name:
        required: true
      parameters_json:
        description: "JSON array of {key,value,secure}"
        required: true
      overwrite:
        type: boolean
        default: true

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      team_name:
        required: true
        type: string
    outputs:
      param_list:
        value: ${{ jobs.fetch.outputs.param_list }}

permissions:
  id-token: write
  contents: read

jobs:

  # =========================
  # STORE PARAMETERS
  # =========================
  store:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ Install AWS CLI v2 properly (replaces unreliable apt method)
      - name: Install AWS CLI v2
        run: |
          if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
            echo "AWS CLI v2 already present."
          else
            echo "Installing AWS CLI v2..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Store Parameters
        run: |
          set -e

          TEAM="${{ github.event.inputs.team_name }}"
          ENV="${{ github.event.inputs.environment }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"
          PARAMS='${{ github.event.inputs.parameters_json }}'

          # Validate JSON input up front
          if ! echo "$PARAMS" | jq empty 2>/dev/null; then
            echo "❌ parameters_json is not valid JSON"
            exit 1
          fi

          echo "$PARAMS" | jq -c '.[]' | while read -r param; do
            KEY=$(echo "$param"   | jq -r '.key')
            VALUE=$(echo "$param" | jq -r '.value')
            SECURE=$(echo "$param" | jq -r '.secure // true')

            # Validation
            if [[ -z "$KEY" || -z "$VALUE" ]]; then
              echo "⚠️  Skipping param with empty key or value"
              continue
            fi

            if [[ ! "$KEY" =~ ^[A-Z0-9_]+$ ]]; then
              echo "⚠️  Invalid key format (must be A-Z, 0-9, _): $KEY"
              continue
            fi

            TYPE="String"
            [ "$SECURE" = "true" ] && TYPE="SecureString"

            # ✅ Use SSM_PATH to avoid overwriting $PATH
            SSM_PATH="/$TEAM/$ENV/$KEY"

            # Check if parameter already exists
            EXISTS=false
            if aws ssm get-parameter --name "$SSM_PATH" >/dev/null 2>&1; then
              EXISTS=true
            fi

            # Skip if exists and overwrite is disabled
            if [ "$EXISTS" = "true" ] && [ "$OVERWRITE" != "true" ]; then
              echo "⏭️  Skipping existing: $KEY"
              continue
            fi

            # ✅ AWS does not allow --tags and --overwrite together.
            # New params  → put-parameter WITHOUT --overwrite, WITH --tags (create path)
            # Existing params → put-parameter WITH --overwrite, WITHOUT --tags, then add-tags-to-resource separately
            if [ "$EXISTS" = "false" ]; then
              aws ssm put-parameter \
                --name "$SSM_PATH" \
                --value "$VALUE" \
                --type "$TYPE" \
                --tags "Key=Team,Value=$TEAM" "Key=Environment,Value=$ENV" \
                --no-cli-pager
            else
              aws ssm put-parameter \
                --name "$SSM_PATH" \
                --value "$VALUE" \
                --type "$TYPE" \
                --overwrite \
                --no-cli-pager

              # Tag separately on update (add-tags-to-resource is idempotent)
              aws ssm add-tags-to-resource \
                --resource-type "Parameter" \
                --resource-id "$SSM_PATH" \
                --tags "Key=Team,Value=$TEAM" "Key=Environment,Value=$ENV" \
                --no-cli-pager
            fi

            echo "✅ Stored: $KEY (type=$TYPE, existed=$EXISTS)"
          done

  # =========================
  # FETCH PARAMETERS
  # =========================
  fetch:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest

    outputs:
      param_list: ${{ steps.fetch.outputs.param_list }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Install AWS CLI v2 properly
      - name: Install AWS CLI v2
        run: |
          if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
            echo "AWS CLI v2 already present."
          else
            echo "Installing AWS CLI v2..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install --update
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::412128478995:role/TestForPMS
          aws-region: us-east-1

      - name: Fetch Parameters (Paginated + Secure)
        id: fetch
        run: |
          set -e

          TEAM="${{ inputs.team_name }}"
          ENV="${{ inputs.environment }}"

          # ✅ Use SSM_PATH to avoid overwriting $PATH
          SSM_PATH="/$TEAM/$ENV/"

          echo "📥 Fetching from $SSM_PATH"

          NEXT_TOKEN=""
          # ✅ Use a temp file to collect PARAM_LIST — fixes subshell scope bug
          PARAM_LIST_FILE=$(mktemp)

          while : ; do
            if [ -z "$NEXT_TOKEN" ]; then
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$SSM_PATH" \
                --with-decryption \
                --recursive \
                --output json \
                --no-cli-pager)
            else
              RESPONSE=$(aws ssm get-parameters-by-path \
                --path "$SSM_PATH" \
                --with-decryption \
                --recursive \
                --starting-token "$NEXT_TOKEN" \
                --output json \
                --no-cli-pager)
            fi

            # Process each parameter
            while read -r param; do
              NAME=$(echo "$param"  | jq -r '.Name')
              VALUE=$(echo "$param" | jq -r '.Value')
              KEY=$(basename "$NAME")

              # Mask sensitive values in logs
              echo "::add-mask::$VALUE"

              # Export to env and track key
              echo "$KEY=$VALUE" >> "$GITHUB_ENV"
              echo "$KEY" >> "$PARAM_LIST_FILE"

              echo "🔑 Loaded: $KEY"
            done < <(echo "$RESPONSE" | jq -c '.Parameters[]')

            NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')
            [ -z "$NEXT_TOKEN" ] && break
          done

          # ✅ Read PARAM_LIST outside subshell — no scope issue
          PARAM_LIST=$(paste -sd ' ' "$PARAM_LIST_FILE")
          rm -f "$PARAM_LIST_FILE"

          echo "param_list=$PARAM_LIST" >> "$GITHUB_OUTPUT"
          echo "📊 Total: $(echo "$PARAM_LIST" | wc -w) params loaded"

      - name: Ready
        run: echo "✅ Parameters ready for use"